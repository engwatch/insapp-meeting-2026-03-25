<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insapp - Защищённый отчёт</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #f3f4f6;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .lock-card {
    background: white;
    border-radius: 16px;
    padding: 48px 40px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    text-align: center;
    max-width: 380px;
    width: 90%;
  }
  .lock-icon {
    width: 56px;
    height: 56px;
    background: #dbeafe;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    font-size: 24px;
  }
  .lock-card h1 {
    font-size: 20px;
    font-weight: 700;
    color: #111827;
    margin-bottom: 8px;
  }
  .lock-card p {
    font-size: 14px;
    color: #6b7280;
    margin-bottom: 24px;
  }
  .lock-input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #e5e7eb;
    border-radius: 10px;
    font-size: 16px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
    text-align: center;
    letter-spacing: 4px;
  }
  .lock-input:focus {
    border-color: #2563eb;
  }
  .lock-btn {
    width: 100%;
    padding: 12px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    margin-top: 12px;
    transition: background 0.2s;
  }
  .lock-btn:hover { background: #1d4ed8; }
  .lock-error {
    color: #ef4444;
    font-size: 13px;
    margin-top: 12px;
    display: none;
    font-weight: 500;
  }
</style>
</head>
<body>
<div class="lock-card">
  <div class="lock-icon">&#128274;</div>
  <h1>Защищённый отчёт</h1>
  <p>Введите пароль для доступа</p>
  <input class="lock-input" type="password" id="pwd" placeholder="&#8226;&#8226;&#8226;&#8226;" autofocus>
  <button class="lock-btn" onclick="decrypt()">Открыть</button>
  <div class="lock-error" id="err">Неверный пароль</div>
</div>

document.getElementById("pwd").addEventListener("keydown",e=>{if(e.key==="Enter")decrypt()});
async function decrypt(){
  try{
    const pwd=document.getElementById("pwd").value;
    const enc=new TextEncoder();
    const salt=Uint8Array.from(atob(SALT),c=>c.charCodeAt(0));
    const iv=Uint8Array.from(atob(IV),c=>c.charCodeAt(0));
    const ct=Uint8Array.from(atob(CT),c=>c.charCodeAt(0));
    const keyMaterial=await crypto.subtle.importKey("raw",enc.encode(pwd),"PBKDF2",false,["deriveBits","deriveKey"]);
    const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:100000,hash:"SHA-256"},keyMaterial,{name:"AES-GCM",length:256},false,["decrypt"]);
    const dec=await crypto.subtle.decrypt({name:"AES-GCM",iv},key,ct);
    document.open();document.write(new TextDecoder().decode(dec));document.close();
  }catch(e){
    document.getElementById("err").style.display="block";
    document.getElementById("pwd").style.borderColor="#ef4444";
  }
}
</script>
